<body>
<script>
    let zoomLevel = 1;

    // زوم
    document.getElementById("zoom-in").onclick = function() {
        zoomLevel += 0.1;
        document.body.style.transform = "scale(" + zoomLevel + ")";
        document.body.style.transformOrigin = "0 0";
    };

    document.getElementById("zoom-out").onclick = function() {
        zoomLevel -= 0.1;
        document.body.style.transform = "scale(" + zoomLevel + ")";
        document.body.style.transformOrigin = "0 0";
    };

    // باز ماندن Dropdown با کلیک
    const viewMenu = document.getElementById("view-menu");

    viewMenu.addEventListener("click", function(event) {

        // جلوگیری از بسته شدن لحظه‌ای به خاطر hover
        event.stopPropagation();

        // فعال/غیر فعال کردن حالت active
        viewMenu.classList.toggle("active");
    });

    // اگر جای دیگری از صفحه کلیک شد → dropdown بسته شود
    document.addEventListener("click", function() {
        viewMenu.classList.remove("active");
    });
</script>
